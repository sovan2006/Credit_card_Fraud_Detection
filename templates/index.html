
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credit Card Fraud Detection</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f7fc;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:650px;
}

.card{
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.header{
text-align:center;
margin-bottom:25px;
}

.header h1{
color:#2563eb;
margin-bottom:8px;
}

.header p{
color:#666;
}

.form-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:6px;
font-weight:600;
color:#333;
}

input,select{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:10px;
font-size:15px;
}

button{
width:100%;
padding:14px;
border:none;
background:#2563eb;
color:white;
font-size:16px;
font-weight:bold;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#1d4ed8;
}

.result{
margin-top:20px;
padding:20px;
border-radius:12px;
text-align:center;
}

.safe{
background:#dcfce7;
color:#166534;
}

.fraud{
background:#fee2e2;
color:#991b1b;
}

.footer{
text-align:center;
margin-top:20px;
font-size:13px;
color:#777;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="header">
<h1>💳 Credit Card Fraud Detection</h1>
<p>Machine Learning Based Prediction System</p>
</div>

<form action="/predict" method="POST">

<div class="form-group">
<label>Transaction ID</label>
<input type="number" name="transaction_id" required>
</div>

<div class="form-group">
<label>Amount</label>
<input type="number" step="0.01" name="amount" required>
</div>

<div class="form-group">
<label>Transaction Hour (0-23)</label>
<input type="number" min="0" max="23" name="transaction_hour" required>
</div>

<div class="form-group">
<label>Merchant Category</label>
<select name="merchant_category">
<option value="1">Retail</option>
<option value="2">Grocery</option>
<option value="3">Travel</option>
<option value="4">Entertainment</option>
</select>
</div>

<div class="form-group">
<label>Foreign Transaction</label>
<select name="foreign_transaction">
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

<div class="form-group">
<label>Location Mismatch</label>
<select name="location_mismatch">
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

<div class="form-group">
<label>Device Trust Score (0-100)</label>
<input type="number" min="0" max="100" name="device_trust_score" required>
</div>

<div class="form-group">
<label>Velocity Last 24 Hours</label>
<input type="number" name="velocity_last_24h" required>
</div>

<div class="form-group">
<label>Cardholder Age</label>
<input type="number" name="cardholder_age" required>
</div>

<button type="submit">
🔍 Predict Transaction
</button>

</form>

{% if prediction_text %}

<div class="result {% if 'Fraudulent' in prediction_text %}fraud{% else %}safe{% endif %}">

<h2>{{ prediction_text }}</h2>

{% if fraud_probability %}
<p><strong>Fraud Probability:</strong> {{ fraud_probability }}%</p>
{% endif %}

</div>

{% endif %}

<div class="footer">
Developed by Sovan Barik 🚀
</div>

</div>

</div>

</body>
</html>
